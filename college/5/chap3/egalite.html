<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fractions égales</title>
<style>
  body { font-family: Arial, sans-serif; background:#e8f0fe; margin:0; padding:10px; }
  .container { max-width:600px; margin:0 auto; background:#fff; border-radius:10px; padding:20px; box-shadow:0 2px 8px rgba(0,0,0,.2); }
  h2 { color:#003399; text-align:center; margin-top:0; }
  .niveau { text-align:center; color:#666; font-size:0.85em; margin-bottom:15px; }
  .enonce { background:#fffde7; border:1px solid #f9a825; border-radius:8px; padding:15px; margin:15px 0; font-size:1.1em; min-height:60px; }
  .enonce .expr { font-size:1.3em; font-weight:bold; color:#003399; text-align:center; display:block; margin:10px 0; }
  input[type=text], input[type=number] { width:120px; padding:8px; font-size:1.1em; border:2px solid #3f51b5; border-radius:5px; text-align:center; }
  .btn { display:inline-block; padding:10px 22px; margin:5px; border:none; border-radius:6px; font-size:1em; cursor:pointer; }
  .btn-verif { background:#1976d2; color:#fff; }
  .btn-new { background:#f57c00; color:#fff; }
  .btn-verif:hover { background:#1565c0; }
  .btn-new:hover { background:#e65100; }
  .msg { margin:10px 0; padding:10px; border-radius:6px; font-size:1.1em; text-align:center; min-height:36px; }
  .ok { background:#e8f5e9; color:#2e7d32; border:1px solid #81c784; }
  .nok { background:#ffebee; color:#c62828; border:1px solid #ef9a9a; }
  .info { background:#e3f2fd; color:#1565c0; border:1px solid #90caf9; }
  .score { text-align:right; font-size:0.9em; color:#555; margin-top:10px; }
  .fraction { display:inline-block; text-align:center; vertical-align:middle; margin:0 4px; }
  .fraction span { display:block; padding:2px 6px; }
  .fraction .num { border-bottom:2px solid #333; }
</style>
</head>
<body>
<div class="container">
  <div class="niveau">5ème — Chap. 3 – Fractions</div>
  <h2>Fractions égales</h2>
  <div class="enonce" id="enonce">Cliquer sur <b>Nouvel exercice</b> pour commencer.</div>
  
  <div style="text-align:center;margin-top:10px;">
    <input type="text" id="rep" placeholder="?" onkeydown="if(event.key==='Enter')verifier()">
    <br><br>
    <button class="btn btn-verif" onclick="verifier()">Vérifier</button>
    <button class="btn btn-new" onclick="nouvelExercice()">Nouvel exercice</button>
  </div>
  <div class="msg" id="msg"></div>
  <div class="score" id="score">Score : 0 / 0</div>
</div>
<script>
var score=0, total=0, rep_attendu=null, exDone=false;
function affMsg(txt,cls){var m=document.getElementById('msg');m.textContent=txt;m.className='msg '+cls;}
function majScore(){document.getElementById('score').textContent='Score : '+score+' / '+total;}
function verifier(){
  if(exDone){affMsg('Cliquer sur Nouvel exercice','info');return;}
  if(rep_attendu===null){affMsg('Cliquer sur Nouvel exercice','info');return;}
  var rep=document.getElementById('rep').value.trim().replace(',','.');
  total++;
  if(check(rep)){score++;exDone=true;affMsg('✓ Bravo !','ok');}
  else{affMsg('✗ Essaie encore ou fais un nouvel exercice','nok');total--;}
  majScore();
}
function nouvelExercice(){
  document.getElementById('rep').value='';
  affMsg('','info');
  exDone=false;
  generer();
}

function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pgcd(a,b){while(b){var t=b;b=a%b;a=t;}return a;}
function generer(){
  var k=rnd(2,6), p=rnd(1,8), q=rnd(2,8);
  while(pgcd(p,q)>1){q=rnd(2,8);}
  var p2=p*k, q2=q*k;
  rep_attendu=q2;
  document.getElementById('enonce').innerHTML=
    'Complète : <br><span class="expr">'+
    '<div class="fraction"><span class="num">'+p+'</span><span>'+q+'</span></div>'+
    ' = '+
    '<div class="fraction"><span class="num">'+p2+'</span><span>?</span></div>'+
    '</span>';
}
function check(r){return parseInt(r)===rep_attendu;}

window.onload=function(){nouvelExercice();};
</script>
</body>
</html>
